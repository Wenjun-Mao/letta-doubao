name: Publish Agent Platform API To GHCR

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - docker/agent_platform_api.Dockerfile
      - agent_platform_api/**
      - prompts/**
      - utils/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/publish-agent-platform-api-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: agent-platform-api

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute lower-case owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate GHCR token
        env:
          GHCR_WRITE_TOKEN: ${{ secrets.GHCR_WRITE_TOKEN }}
        run: |
          if [ -z "$GHCR_WRITE_TOKEN" ]; then
            echo "GHCR_WRITE_TOKEN is required for GHCR push."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_WRITE_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/agent_platform_api.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

