name: Validate Agent Platform OpenAPI And Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - agent_platform_api/**
      - ade_core/**
      - scripts/export_openapi.py
      - scripts/generate_openapi_zh_manual.py
      - docs/**
      - frontend-ade/public/openapi/**
      - .github/workflows/openapi-docs-check.yml
  push:
    branches:
      - main
    paths:
      - agent_platform_api/**
      - ade_core/**
      - scripts/export_openapi.py
      - scripts/generate_openapi_zh_manual.py
      - docs/**
      - frontend-ade/public/openapi/**
      - .github/workflows/openapi-docs-check.yml

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Check OpenAPI artifact drift
        run: uv run python scripts/export_openapi.py --check --output docs/openapi/agent-platform-openapi.json

