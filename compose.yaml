name: letta-Qwen3-5-35B

services:
  letta_db:
    image: pgvector/pgvector:0.8.1-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LETTA_PG_USER:-letta}
      POSTGRES_PASSWORD: ${LETTA_PG_PASSWORD:-letta}
      POSTGRES_DB: ${LETTA_PG_DB:-letta}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${LETTA_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LETTA_PG_USER:-letta} -d ${LETTA_PG_DB:-letta}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  letta_server:
    image: letta/letta:latest
    restart: unless-stopped
    depends_on:
      letta_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${LETTA_ENV_FILE:-.env3}
    environment:
      LETTA_PG_URI: ${LETTA_PG_URI:-postgresql://${LETTA_PG_USER:-letta}:${LETTA_PG_PASSWORD:-letta}@${LETTA_DB_HOST:-letta_db}:${LETTA_PG_PORT:-5432}/${LETTA_PG_DB:-letta}}
      LETTA_REDIS_HOST: ${LETTA_REDIS_HOST:-redis}
      LETTA_REDIS_PORT: ${LETTA_REDIS_PORT:-6379}
      LETTA_DEBUG: ${LETTA_DEBUG:-True}
    ports:
      - "${LETTA_ADE_PORT:-8083}:8083"
      - "${LETTA_API_PORT:-8283}:8283"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --noproxy '*' http://127.0.0.1:8283/v1/health/ > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 45s
  dev_ui:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    # profiles:
    #   - ui
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - UV_LINK_MODE=copy
      - LETTA_BASE_URL=http://letta_server:8283
      - LETTA_DEFAULT_EMBEDDING_HANDLE=${LETTA_DEFAULT_EMBEDDING_HANDLE:-}
      - LETTA_EMBEDDING_HANDLE=${LETTA_EMBEDDING_HANDLE:-}
    ports:
      - "8284:8284"
    depends_on:
      letta_server:
        condition: service_healthy
    command: ["uv", "run", "--no-dev", "uvicorn", "dev_ui.main:app", "--host", "0.0.0.0", "--port", "8284"]
