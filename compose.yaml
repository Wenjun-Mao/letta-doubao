name: letta-Qwen3-5-35B

services:
  letta_db:
    image: pgvector/pgvector:0.8.1-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LETTA_PG_USER:-letta}
      POSTGRES_PASSWORD: ${LETTA_PG_PASSWORD:-letta}
      POSTGRES_DB: ${LETTA_PG_DB:-letta}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${LETTA_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LETTA_PG_USER:-letta} -d ${LETTA_PG_DB:-letta}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  letta_server:
    image: ${LETTA_SERVER_IMAGE:-letta/letta:0.16.7}
    restart: unless-stopped
    depends_on:
      letta_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${LETTA_ENV_FILE:-.env}
    environment:
      LETTA_PG_URI: ${LETTA_PG_URI:-postgresql://${LETTA_PG_USER:-letta}:${LETTA_PG_PASSWORD:-letta}@${LETTA_DB_HOST:-letta_db}:${LETTA_PG_PORT:-5432}/${LETTA_PG_DB:-letta}}
      LETTA_REDIS_HOST: ${LETTA_REDIS_HOST:-redis}
      LETTA_REDIS_PORT: ${LETTA_REDIS_PORT:-6379}
      LETTA_DEBUG: ${LETTA_DEBUG:-True}
      PYTHONPATH: ${PYTHONPATH:-/app}
      NLTK_DATA: ${NLTK_DATA:-/root/nltk_data}
      LETTA_NLTK_STRICT_LOCAL: ${LETTA_NLTK_STRICT_LOCAL:-true}
      LETTA_NLTK_DOWNLOAD_TIMEOUT_SECONDS: ${LETTA_NLTK_DOWNLOAD_TIMEOUT_SECONDS:-5}
    volumes:
      - ./data/nltk_data:/root/nltk_data:ro
      - ./docker/sitecustomize.py:/app/sitecustomize.py:ro
    ports:
      - "${LETTA_ADE_PORT:-8083}:8083"
      - "${LETTA_API_PORT:-8283}:8283"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 --noproxy '*' http://127.0.0.1:8283/v1/health/ > /dev/null 2>&1"]
      interval: ${LETTA_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${LETTA_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${LETTA_HEALTHCHECK_RETRIES:-30}
      start_period: ${LETTA_HEALTHCHECK_START_PERIOD:-180s}
  dev_ui:
    build:
      context: .
      dockerfile: dev_ui/Dockerfile
    # profiles:
    #   - ui
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - LETTA_BASE_URL=http://letta_server:8283
      - LETTA_DEFAULT_EMBEDDING_HANDLE=${LETTA_DEFAULT_EMBEDDING_HANDLE:-}
      - LETTA_EMBEDDING_HANDLE=${LETTA_EMBEDDING_HANDLE:-}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AGENT_PLATFORM_COMMENTING_PROVIDER=${AGENT_PLATFORM_COMMENTING_PROVIDER:-openai-compatible}
      - AGENT_PLATFORM_COMMENTING_BASE_URL=${AGENT_PLATFORM_COMMENTING_BASE_URL:-}
      - AGENT_PLATFORM_COMMENTING_API_KEY=${AGENT_PLATFORM_COMMENTING_API_KEY:-}
      - AGENT_PLATFORM_COMMENTING_DEFAULT_MODEL=${AGENT_PLATFORM_COMMENTING_DEFAULT_MODEL:-}
      - AGENT_PLATFORM_COMMENTING_TIMEOUT_SECONDS=${AGENT_PLATFORM_COMMENTING_TIMEOUT_SECONDS:-60}
      - AGENT_PLATFORM_COMMENTING_MAX_TOKENS=${AGENT_PLATFORM_COMMENTING_MAX_TOKENS:-0}
      - AGENT_PLATFORM_COMMENTING_TASK_SHAPE=${AGENT_PLATFORM_COMMENTING_TASK_SHAPE:-auto}
    volumes:
      - ./prompts:/app/prompts
      - ./tools/custom:/app/tools/custom
      - ./data/agent_lifecycle:/app/data/agent_lifecycle
    ports:
      - "8284:8284"
    depends_on:
      letta_server:
        condition: service_healthy

  ade_frontend:
    # profiles:
    #   - ade
    build:
      context: ./frontend-ade
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADE_UI_VERSION: ${ADE_UI_VERSION:-}
        NEXT_PUBLIC_ADE_UI_BUILD: ${ADE_UI_BUILD:-}
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_DEV_UI_BASE_URL=${ADE_DEV_UI_BASE_URL:-http://127.0.0.1:8284}
      - NEXT_PUBLIC_MINTLIFY_DOCS_URL=${ADE_DOCS_URL:-/docs}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      dev_ui:
        condition: service_started
